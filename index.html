<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lower Division Core Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f9f8f5;
    --surface: #ffffff;
    --surface2: #f1f0eb;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.2);
    --text: #1a1a18;
    --text2: #5f5e58;
    --text3: #9a9890;
    --green: #1D9E75;
    --green-bg: #E1F5EE;
    --green-text: #085041;
    --amber: #EF9F27;
    --amber-bg: #FAEEDA;
    --amber-text: #633806;
    --blue: #378ADD;
    --blue-bg: #E6F1FB;
    --blue-text: #0C447C;
    --radius: 10px;
    --radius-sm: 6px;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .page { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }
  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 1rem; }
  .stat { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; }
  .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; letter-spacing: 0.04em; }
  .stat-val { font-size: 22px; font-weight: 500; }
  .stat-val.green { color: var(--green-text); }
  .stat-val.amber { color: var(--amber-text); }
  .prog-wrap { background: var(--surface2); border-radius: 99px; height: 5px; margin-bottom: 1.5rem; overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 99px; background: var(--green); transition: width 0.4s ease; }
  .course-row { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 13px 15px; margin-bottom: 8px; transition: border-color 0.15s; }
  .course-row:hover { border-color: var(--border2); }
  .course-top { display: flex; align-items: center; gap: 10px; }
  .status-btn { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border2); cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: none; transition: background 0.15s, border-color 0.15s; }
  .status-btn.done { background: var(--green); border-color: var(--green); }
  .status-btn.in-progress { background: var(--amber); border-color: var(--amber); }
  .course-info { flex: 1; min-width: 0; }
  .course-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .course-meta { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .cr-badge { font-size: 11px; background: var(--surface2); border-radius: 4px; padding: 3px 7px; color: var(--text2); white-space: nowrap; border: 0.5px solid var(--border); }
  .cc-tag { font-size: 11px; padding: 3px 7px; border-radius: 4px; background: var(--amber-bg); color: var(--amber-text); border: 0.5px solid var(--amber); white-space: nowrap; display: flex; align-items: center; gap: 4px; }
  .expand-btn { background: none; border: none; cursor: pointer; color: var(--text3); padding: 3px 5px; border-radius: 4px; line-height: 1; }
  .expand-btn:hover { background: var(--surface2); color: var(--text2); }
  .course-detail { margin-top: 12px; padding-top: 12px; border-top: 0.5px solid var(--border); display: none; }
  .course-detail.open { display: block; }
  .detail-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
  .detail-label { font-size: 11px; color: var(--text2); width: 80px; flex-shrink: 0; padding-top: 7px; }
  .detail-input { flex: 1; font-size: 13px; background: var(--surface2); border: 0.5px solid transparent; border-radius: var(--radius-sm); padding: 6px 9px; color: var(--text); font-family: 'DM Sans', sans-serif; }
  .detail-input:hover { border-color: var(--border2); }
  .detail-input:focus { outline: none; border-color: var(--blue); background: var(--surface); }
  .detail-input::placeholder { color: var(--text3); }
  .note-area { flex: 1; font-size: 13px; background: var(--surface2); border: 0.5px solid transparent; border-radius: var(--radius-sm); padding: 7px 9px; color: var(--text); resize: vertical; min-height: 60px; font-family: 'DM Sans', sans-serif; line-height: 1.5; }
  .note-area:hover { border-color: var(--border2); }
  .note-area:focus { outline: none; border-color: var(--blue); background: var(--surface); }
  .note-area::placeholder { color: var(--text3); }
  .status-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .status-opt { font-size: 12px; padding: 4px 10px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: none; cursor: pointer; color: var(--text2); font-family: 'DM Sans', sans-serif; transition: background 0.12s; }
  .status-opt:hover { background: var(--surface2); }
  .status-opt.active-done { background: var(--green-bg); border-color: var(--green); color: var(--green-text); }
  .status-opt.active-ip { background: var(--amber-bg); border-color: var(--amber); color: var(--amber-text); }
  .status-opt.active-planned { background: var(--blue-bg); border-color: var(--blue); color: var(--blue-text); }
  .status-opt.active-none { background: var(--surface2); border-color: var(--border2); color: var(--text); }
  .save-note { font-size: 11px; color: var(--text3); text-align: right; margin-top: 1rem; }
  .grade-select { flex: 1; font-size: 13px; background: var(--surface2); border: 0.5px solid transparent; border-radius: var(--radius-sm); padding: 6px 9px; color: var(--text); font-family: 'DM Sans', sans-serif; cursor: pointer; }
  .grade-select:hover { border-color: var(--border2); }
  .grade-select:focus { outline: none; border-color: var(--blue); background: var(--surface); }
  .grade-badge { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; white-space: nowrap; }
  .grade-a { background: var(--green-bg); color: var(--green-text); border: 0.5px solid var(--green); }
  .grade-b { background: var(--blue-bg); color: var(--blue-text); border: 0.5px solid var(--blue); }
  .grade-c { background: var(--amber-bg); color: var(--amber-text); border: 0.5px solid var(--amber); }
  .grade-d { background: #FCEBEB; color: #791F1F; border: 0.5px solid #E24B4A; }
  .grade-f { background: #FCEBEB; color: #501313; border: 0.5px solid #A32D2D; }
  @media (max-width: 520px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    .course-name { white-space: normal; }
  }
</style>
</head>
<body>
<div class="page">
  <h1>Lower Division Core</h1>
  <p class="subtitle">Engineering program · 40 units required · progress auto-saves in your browser</p>
  <div class="stats">
    <div class="stat"><div class="stat-label">total units</div><div class="stat-val" id="s-total">40</div></div>
    <div class="stat"><div class="stat-label">completed</div><div class="stat-val green" id="s-done">0</div></div>
    <div class="stat"><div class="stat-label">in progress</div><div class="stat-val amber" id="s-ip">0</div></div>
    <div class="stat"><div class="stat-label">remaining</div><div class="stat-val" id="s-rem">40</div></div>
    <div class="stat"><div class="stat-label">GPA</div><div class="stat-val" id="s-gpa">—</div></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div id="courses"></div>
  <p class="save-note"><i class="ti ti-device-floppy" style="font-size:13px;vertical-align:-2px"></i> progress saves automatically to this browser</p>
</div>

<script>
const DEFAULT_COURSES = [
  {id:0,code:'CHEM 110',name:'General Chemistry for Engineering',units:3,breadth:'GE-5A, GE-5C',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:1,code:'ENGR 200',name:'Introduction to Engineering and Design',units:3,breadth:'',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:2,code:'ENGR 210',name:'Manufacturing Materials and Processes',units:4,breadth:'',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:3,code:'ENGR 215',name:'Computational Methods in Engineering',units:3,breadth:'',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:4,code:'ENGR 220',name:'Statics',units:3,breadth:'',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:5,code:'ENGR 230',name:'Electric Circuits I',units:3,breadth:'',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:6,code:'MATH 130',name:'Calculus I',units:4,breadth:'GE-2',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:7,code:'MATH 131',name:'Calculus II',units:3,breadth:'',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:8,code:'MATH 215',name:'Introduction to Linear Algebra',units:3,breadth:'',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:9,code:'PHYS 135',name:'Physics for Scientists and Engineers I',units:4,breadth:'GE-5A, GE-5C',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:10,code:'PHYS 136',name:'Physics for Scientists and Engineers II',units:4,breadth:'',status:'none',cc:'',equiv:'',grade:'',note:''},
  {id:11,code:'PSYC 100',name:'General Psychology',units:3,breadth:'GE-4',status:'none',cc:'',equiv:'',grade:'',note:''},
];

function load() {
  try {
    const saved = localStorage.getItem('ldc-courses');
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_COURSES));
}

function save() {
  try { localStorage.setItem('ldc-courses', JSON.stringify(courses)); } catch(e) {}
}

let courses = load();
let expanded = new Set();

function gradeToPoints(g) {
  const map = {'A+':4.0,'A':4.0,'A-':3.7,'B+':3.3,'B':3.0,'B-':2.7,'C+':2.3,'C':2.0,'C-':1.7,'D+':1.3,'D':1.0,'D-':0.7,'F':0.0};
  return map[g] !== undefined ? map[g] : null;
}

function gradeClass(g) {
  if (!g) return '';
  if (g.startsWith('A')) return 'grade-a';
  if (g.startsWith('B')) return 'grade-b';
  if (g.startsWith('C')) return 'grade-c';
  if (g.startsWith('D')) return 'grade-d';
  if (g === 'F') return 'grade-f';
  return '';
}

function calcStats() {
  let done=0, ip=0, gpaPoints=0, gpaUnits=0;
  courses.forEach(c => {
    if(c.status==='done') done+=c.units;
    else if(c.status==='in-progress') ip+=c.units;
    const pts = gradeToPoints(c.grade);
    if(pts !== null && c.status==='done') { gpaPoints += pts * c.units; gpaUnits += c.units; }
  });
  document.getElementById('s-done').textContent = done;
  document.getElementById('s-ip').textContent = ip;
  document.getElementById('s-rem').textContent = 40-done;
  document.getElementById('s-gpa').textContent = gpaUnits > 0 ? (gpaPoints/gpaUnits).toFixed(2) : '—';
  document.getElementById('prog').style.width = Math.round(done/40*100)+'%';
}

function render() {
  calcStats();
  const el = document.getElementById('courses');
  el.innerHTML = '';
  courses.forEach(c => {
    const row = document.createElement('div');
    row.className = 'course-row';
    const isOpen = expanded.has(c.id);
    const checkIcon = c.status==='done' ? '<i class="ti ti-check" style="font-size:12px;color:#fff"></i>' : c.status==='in-progress' ? '<i class="ti ti-player-play" style="font-size:10px;color:#fff"></i>' : '';
    const ccTag = c.cc ? `<span class="cc-tag"><i class="ti ti-building" style="font-size:11px"></i>${c.cc}</span>` : '';
    const gradeBadge = c.grade ? `<span class="grade-badge ${gradeClass(c.grade)}">${c.grade}</span>` : '';
    row.innerHTML = `
      <div class="course-top">
        <button class="status-btn ${c.status==='done'?'done':c.status==='in-progress'?'in-progress':''}" data-id="${c.id}" aria-label="cycle status">${checkIcon}</button>
        <div class="course-info">
          <div class="course-name">${c.code} — ${c.name}</div>
          <div class="course-meta">${c.breadth||'&nbsp;'}</div>
        </div>
        ${ccTag}
        ${gradeBadge}
        <span class="cr-badge">${c.units} units</span>
        <button class="expand-btn" data-eid="${c.id}" aria-label="${isOpen?'collapse':'expand'}">
          <i class="ti ti-chevron-${isOpen?'up':'down'}" style="font-size:17px"></i>
        </button>
      </div>
      <div class="course-detail ${isOpen?'open':''}">
        <div class="detail-row">
          <span class="detail-label">status</span>
          <div class="status-row">
            <button class="status-opt ${c.status==='none'?'active-none':''}" data-sid="${c.id}" data-s="none">not started</button>
            <button class="status-opt ${c.status==='planned'?'active-planned':''}" data-sid="${c.id}" data-s="planned">planned</button>
            <button class="status-opt ${c.status==='in-progress'?'active-ip':''}" data-sid="${c.id}" data-s="in-progress">in progress</button>
            <button class="status-opt ${c.status==='done'?'active-done':''}" data-sid="${c.id}" data-s="done">completed</button>
          </div>
        </div>
        <div class="detail-row">
          <span class="detail-label">taking at CC</span>
          <input class="detail-input" type="text" placeholder="e.g. De Anza, Foothill, Diablo Valley…" value="${c.cc}" data-field="cc" data-cid="${c.id}" />
        </div>
        <div class="detail-row">
          <span class="detail-label">CC equiv.</span>
          <input class="detail-input" type="text" placeholder="e.g. MATH 1A" value="${c.equiv}" data-field="equiv" data-cid="${c.id}" />
        </div>
        <div class="detail-row">
          <span class="detail-label">grade</span>
          <select class="grade-select" data-field="grade" data-cid="${c.id}">
            <option value="">— select grade —</option>
            ${['A+','A','A-','B+','B','B-','C+','C','C-','D+','D','D-','F'].map(g=>`<option value="${g}" ${c.grade===g?'selected':''}>${g}</option>`).join('')}
          </select>
        </div>
        <div class="detail-row">
          <span class="detail-label">notes</span>
          <textarea class="note-area" placeholder="Prereqs, semester, transfer articulation notes…" data-field="note" data-cid="${c.id}">${c.note}</textarea>
        </div>
      </div>
    `;
    el.appendChild(row);
  });

  el.querySelectorAll('.status-btn').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.id);
      const c = courses[id];
      c.status = c.status==='none'?'in-progress':c.status==='in-progress'?'done':'none';
      expanded.add(id);
      save(); render();
    };
  });

  el.querySelectorAll('.expand-btn').forEach(btn => {
    btn.onclick = () => {
      const id = parseInt(btn.dataset.eid);
      if(expanded.has(id)) expanded.delete(id); else expanded.add(id);
      render();
    };
  });

  el.querySelectorAll('[data-sid]').forEach(btn => {
    btn.onclick = () => {
      courses[parseInt(btn.dataset.sid)].status = btn.dataset.s;
      save(); render();
    };
  });

  el.querySelectorAll('[data-field]').forEach(inp => {
    inp.oninput = e => {
      courses[parseInt(e.target.dataset.cid)][e.target.dataset.field] = e.target.value;
      save(); calcStats();
    };
  });
}

render();
</script>
</body>
</html>
